<!DOCTYPE html>
<html>
<head>
  <title>Loan Calculator + Amortization</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      max-width: 900px;
      margin: 30px auto;
    }

    input, button {
      padding: 10px;
      margin: 8px 0;
      width: 100%;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      font-size: 12px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 6px;
      text-align: center;
    }

    th {
      background: #f4f4f4;
    }

    canvas {
      margin-top: 30px;
    }
  </style>
</head>

<body>

<h2>30-Year Loan Calculator</h2>

<label>Loan Amount ($)</label>
<input type="number" id="amount">

<label>Annual Interest Rate (%)</label>
<input type="number" id="rate">

<button onclick="calculate()">Calculate</button>

<h3 id="monthly"></h3>

<canvas id="chart" height="120"></canvas>

<table id="table"></table>

<script>
function calculate() {
  let P = parseFloat(document.getElementById("amount").value);
  let annualRate = parseFloat(document.getElementById("rate").value);

  let r = annualRate / 100 / 12;
  let n = 30 * 12;

  let M = P * (r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);

  document.getElementById("monthly").innerText =
    "Monthly Payment: $" + M.toFixed(2);

  let balance = P;
  let labels = [];
  let balances = [];

  let tableHTML = `
    <tr>
      <th>Month</th>
      <th>Payment</th>
      <th>Interest</th>
      <th>Principal</th>
      <th>Balance</th>
    </tr>
  `;

  for (let i = 1; i <= n; i++) {
    let interest = balance * r;
    let principal = M - interest;
    balance -= principal;

    labels.push(i);
    balances.push(balance);

    if (i <= 12) { // only show first year in table (keeps page usable)
      tableHTML += `
        <tr>
          <td>${i}</td>
          <td>${M.toFixed(2)}</td>
          <td>${interest.toFixed(2)}</td>
          <td>${principal.toFixed(2)}</td>
          <td>${balance.toFixed(2)}</td>
        </tr>
      `;
    }
  }

  document.getElementById("table").innerHTML = tableHTML;

  // Chart
  new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: "Loan Balance",
        data: balances,
        borderColor: "blue",
        fill: false
      }]
    }
  });
}
</script>

</body>
</html>
