<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Financial Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0f1a;
  color: #e6e6e6;
}

.header {
  background: #111827;
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
}

.container {
  display: grid;
  grid-template-columns: 250px 1fr;
  height: 100vh;
}

.sidebar {
  background: #111827;
  padding: 20px;
}

.sidebar h3 {
  color: #9ca3af;
}

.sidebar input {
  width: 100%;
  padding: 8px;
  margin: 8px 0;
  background: #1f2937;
  border: none;
  color: white;
}

.sidebar button {
  width: 100%;
  padding: 10px;
  background: #2563eb;
  border: none;
  color: white;
  cursor: pointer;
}

.main {
  padding: 20px;
  overflow-y: auto;
}

.card-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
}

.card {
  background: #1f2937;
  padding: 15px;
  border-radius: 8px;
}

.card h4 {
  margin: 0 0 10px 0;
  color: #9ca3af;
}

.chart-container {
  margin-top: 20px;
  background: #1f2937;
  padding: 15px;
  border-radius: 8px;
}

.table-container {
  margin-top: 20px;
  max-height: 400px;
  overflow-y: auto;
  background: #1f2937;
  padding: 10px;
  border-radius: 8px;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

th, td {
  border: 1px solid #374151;
  padding: 6px;
  text-align: center;
}

th {
  background: #111827;
}

</style>
</head>

<body>

<div class="header">📊 Financial Dashboard</div>

<div class="container">

<div class="sidebar">
  <h3>Inputs</h3>

  <input type="number" id="amount" placeholder="Loan Amount">
  <input type="number" id="rate" placeholder="Interest %">
  <input type="number" id="years" placeholder="Years (e.g. 30)" value="30">

  <button onclick="calculate()">Run Analysis</button>
</div>

<div class="main">

<div class="card-grid">
  <div class="card"><h4>Beta</h4><p id="beta">-</p></div>
  <div class="card"><h4>Alpha</h4><p id="alpha">-</p></div>
  <div class="card"><h4>Volatility</h4><p id="vol">-</p></div>
  <div class="card"><h4>Sharpe Ratio</h4><p id="sharpe">-</p></div>
</div>

<div class="chart-container">
  <canvas id="returnsChart"></canvas>
</div>

<div class="table-container">
  <table id="table"></table>
</div>

</div>
</div>

<script>
function randomData(n) {
  let data = [];
  for (let i = 0; i < n; i++) {
    data.push((Math.random() - 0.5) * 0.1);
  }
  return data;
}

function calculate() {
  let P = parseFloat(document.getElementById("amount").value);
  let annualRate = parseFloat(document.getElementById("rate").value);

  let r = annualRate / 100 / 12;
  let years = parseInt(document.getElementById("years").value) || 30;
  let n = years * 12; // dynamic months

  let M = P * (r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);

  // Finance metrics (mock for now)
  let returns = randomData(50);
  let avg = returns.reduce((a,b)=>a+b,0)/returns.length;
  let variance = returns.reduce((a,b)=>a + Math.pow(b-avg,2),0)/returns.length;
  let std = Math.sqrt(variance);
  let sharpe = avg / std;

  document.getElementById("beta").innerText = (Math.random()*1.5).toFixed(2);
  document.getElementById("alpha").innerText = (Math.random()*0.1).toFixed(3);
  document.getElementById("vol").innerText = std.toFixed(3);
  document.getElementById("sharpe").innerText = sharpe.toFixed(2);

  // Chart
  let labels = returns.map((_,i)=>i+1);

  new Chart(document.getElementById("returnsChart"), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Returns',
        data: returns
      }]
    }
  });

  // Amortization table (full period based on years input)
  let balance = P;

  let tableHTML = `
    <tr>
      <th>Month</th>
      <th>Payment</th>
      <th>Interest</th>
      <th>Principal</th>
      <th>Balance</th>
    </tr>
  `;

  for (let i = 1; i <= n; i++) {
    let interest = balance * r;
    let principal = M - interest;
    balance -= principal;

    tableHTML += `
      <tr>
        <td>${i}</td>
        <td>${M.toFixed(2)}</td>
        <td>${interest.toFixed(2)}</td>
        <td>${principal.toFixed(2)}</td>
        <td>${balance.toFixed(2)}</td>
      </tr>
    `;
  }

  document.getElementById("table").innerHTML = tableHTML;
}
</script>

</body>
</html>
